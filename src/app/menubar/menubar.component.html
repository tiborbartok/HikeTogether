<nav>
  <div class="logo">
    <a *ngIf="!isLoggedIn" [routerLink]="'/'" class="brand-name">HikeTogether</a>
    <a *ngIf="isLoggedIn" [routerLink]="'/home'" class="brand-name">HikeTogether</a>
  </div>

  <!-- Burger Menu Button (Only shown on small screens) -->
  <button class="burger-menu" (click)="toggleMenu()">
    <span class="burger-icon"></span>
  </button>

  <!-- Navigation links, visible on large screens and toggled on small screens -->
  <ul [class.active]="menuVisible">
    <li *ngIf="!isLoggedIn"><a routerLink="/login">Login</a></li>
    <li *ngIf="!isLoggedIn"><a routerLink="/register">Register</a></li>
    <li *ngIf="isLoggedIn"><a routerLink="/home">Home</a></li>
    <li *ngIf="isLoggedIn"><a routerLink="/hikes">Hikes</a></li>
    <li *ngIf="isLoggedIn"><a routerLink="/profile">Profile</a></li>
    <li *ngIf="isLoggedIn"><a href="#" (click)="logout($event)">Logout</a></li>
  </ul>
</nav>
